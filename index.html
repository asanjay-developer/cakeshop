<!DOCTYPE html>
<html lang="en">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<title>Cake Shop</title>
</head>
<style>
    * {
        margin: 0px;
        padding: 0px;
        font-family: "Poppins", sans-serif;
    }

    body {
        background: url("./img/cake.jpg") no-repeat center fixed;
        background-size: cover;
    }

    div {
        background-color: palevioletred;
        color: white;
        width: 50%;
        margin-top: 15%;
        margin-left: 25%;
        text-align: center;
        border-radius: 10px;
        opacity: 0.9;
    }

    h1 {
        padding: 15px;
        font-size: 3em;
    }

    p {
        padding: 20px;
    }
    i{
        font-size: 50px;
        background-color: palevioletred ;
        border-radius: 999px;
        margin-top: -100px;
        padding: 10px;
    }
    button{
        padding: 15px;
        margin: 10px;
        border: none;
        background-color: lightgreen;
        color: white;
        font-size: 1em;
        border-radius: 10px;
        transition: 0.3s;
        font-weight: bold;
        cursor: pointer;
    }
    button:hover{
        background-color: white;
        color: lightgreen;
        transform: scale(1.05);
    }
</style>

<body>
    <div>
        <i class="fa-solid fa-cake-candles"></i>
        <h1>Cake Shop</h1>
        <p>“Something sweet is on the way! 🍰 Our cake shop is getting ready to bring you freshly baked delights made with love. Stay tuned for a delicious experience coming soon.”</p>
        <button>Contact Me</button>
    </div>
</body>

</html>
